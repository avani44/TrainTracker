<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrainFind — Search Trains</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="logo-tag"><span></span> Live Train Search</div>
            <h1>Find Your<br /><em>Train</em></h1>
            <p class="subtitle">Enter station codes to search available trains</p>
        </header>

        <div class="search-card">
            <div class="fields-row">
                <div class="field">
                    <label>From (Source Code)</label>
                    <input type="text" id="sourceCode" placeholder="NDLS" maxlength="6" />
                </div>

                <button class="swap-btn" id="swapBtn" title="Swap stations">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16V4m0 0L3 8m4-4l4 4" />
                        <path d="M17 8v12m0 0l4-4m-4 4l-4-4" />
                    </svg>
                </button>

                <div class="field">
                    <label>To (Destination Code)</label>
                    <input type="text" id="destCode" placeholder="CST" maxlength="6" />
                </div>
            </div>

            <button class="search-btn" id="searchBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                Search Trains
            </button>

            <div class="error-box" id="errorBox"></div>
        </div>

        <div class="loader" id="loader">
            <div class="loader-track">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
            <span>SEARCHING TRAINS</span>
        </div>

        <div id="resultsSection"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
